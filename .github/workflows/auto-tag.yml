name: Versionamento Automático por Commits

on:
  push:
    branches:
      - main
      - master

jobs:
  tag:
    name: Criar tag semântica automaticamente
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar tag semântica baseada nos commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main,master
          tag_prefix: 'v'

      - name: Resumo da nova versão
        run: |
          echo "### 🏷️ Nova tag gerada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag anterior | \`${{ steps.tag.outputs.previous_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nova tag     | \`${{ steps.tag.outputs.new_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Changelog    | ${{ steps.tag.outputs.changelog }} |" >> $GITHUB_STEP_SUMMARY
